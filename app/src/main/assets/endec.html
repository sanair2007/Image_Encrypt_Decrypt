<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Encrypt Decrypt</title>

<style>
:root {
  --scale: 1;
  --unit: calc(10mm * var(--scale));
}

body {
  margin: 0;
  font-family: "Segoe UI", Tahoma, sans-serif;
  background: linear-gradient(#dfe3e6, #bfc6cc);
  color: #222;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.top {
  text-align: left;
  padding: calc(var(--unit) * 0.5);
  font-weight: 600;
  font-size: calc(var(--unit) * 0.45);
  background: linear-gradient(#f7f7f7, #dcdcdc);
  border-bottom: 1px solid #aaa;
  box-shadow: inset 0 1px white;
}

.content {
  display: flex;
  flex: 1;
  flex-direction: column;
  gap: calc(var(--unit) * 0.5);
  padding: calc(var(--unit) * 0.5);
  height: calc(100vh - calc(var(--unit) * 1.5));
  overflow: hidden;
}

.controls, .output {
  flex: 1;
  min-height: 0;
  max-height: 100%;
  background: linear-gradient(#f4f4f4, #dcdcdc);
  border: 1px solid #a0a0a0;
  border-radius: 3mm;
  box-shadow: inset 0 1px white, 0 2px 4px rgba(0,0,0,0.2);
  padding: calc(var(--unit) * 0.5);
  display: flex;
  flex-direction: column;
  gap: calc(var(--unit) * 0.5);
  overflow: hidden;
}

input {
  height: calc(var(--unit) * 1.1);
  font-size: calc(var(--unit) * 0.3);
  padding: calc(var(--unit) * 0.2);
  border-radius: 2mm;
  border: 1px solid #888;
  background: linear-gradient(#ffffff, #e6e6e6);
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
}

.fileRow {
  display: flex;
  gap: calc(var(--unit) * 0.4);
  align-items: stretch;
}

.fileButton {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: calc(var(--unit) * 0.2);
  height: calc(var(--unit) * 1.1);
  width: calc(var(--unit) * 2.2);
  font-size: calc(var(--unit) * 0.3);
  border-radius: 2mm;
  border: 1px solid #888;
  background: linear-gradient(#fefefe, #d0d0d0);
  box-shadow: inset 0 1px white, 0 1px 2px rgba(0,0,0,0.2);
  cursor: pointer;
  position: relative;
  flex-shrink: 0;
}

.fileButton input {
  position: absolute;
  opacity: 0;
  width: 100%;
  height: 100%;
  cursor: pointer;
}

.fileButton:active {
  background: linear-gradient(#d0d0d0, #fefefe);
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
}

.fileName {
  flex: 1;
  display: flex;
  align-items: center;
  height: calc(var(--unit) * 1.1);
  padding: calc(var(--unit) * 0.2);
  border-radius: 2mm;
  border: 1px solid #888;
  background: linear-gradient(#ffffff, #e6e6e6);
  box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
  font-size: calc(var(--unit) * 0.28);
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

button {
  height: calc(var(--unit) * 1.1);
  font-size: calc(var(--unit) * 0.3);
  border-radius: 2mm;
  border: 1px solid #888;
  background: linear-gradient(#fefefe, #d0d0d0);
  box-shadow: inset 0 1px white, 0 1px 2px rgba(0,0,0,0.2);
  cursor: pointer;
}

button:active {
  background: linear-gradient(#d0d0d0, #fefefe);
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.buttons {
  display: flex;
  gap: calc(var(--unit) * 0.4);
}

.buttons button {
  flex: 1;
}

.output {
  overflow: hidden;
}

#results {
  display: flex;
  flex-direction: column;
  height: 100%;
  min-height: 0;
  padding: calc(var(--unit) * 0.3);
  box-sizing: border-box;
}

#results h4,
#results a {
  flex: 0 0 auto;
}

#results img {
  flex: 1;
  min-height: 0;
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  object-fit: contain;
  margin: calc(var(--unit) * 0.2);
}

a {
  color: #0645ad;
  text-decoration: underline;
  font-size: calc(var(--unit) * 0.28);
}

@media (min-width: 700px) {
  .content {
    flex-direction: row;
  }
  .controls {
    width: 35%;
  }
  .output {
    width: 65%;
  }
}</style>
</head>

<body>
<div class="app">

  <header class="top">Encrypt/Decrypt Image</header>

  <main class="content">

    <section class="controls">
<div class="fileRow">
  <label class="fileButton">
    Browse
    <input type="file" id="fileInput" accept="image/*">
  </label>
  <div id="fileName" class="fileName">No file selected</div>
</div>
      <input type="text" id="keyInput" placeholder="Enter password">

      <div class="buttons">
        <button id="encryptBtn" disabled>Encrypt</button>
        <button id="decryptBtn" disabled>Decrypt</button>
      </div>

    </section>

    <section class="output">
      <div id="results">Result will appear here</div>
    </section>

  </main>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
let currentFile = null;
let currentFileName = "";

const fileInput = document.getElementById("fileInput");
const encryptBtn = document.getElementById("encryptBtn");
const decryptBtn = document.getElementById("decryptBtn");

fileInput.addEventListener("change", (e) => {
  const nameBox = document.getElementById("fileName");

  if (!e.target.files.length) {
    currentFile = null;
    encryptBtn.disabled = true;
    decryptBtn.disabled = true;
    nameBox.textContent = "No file selected";
    return;
  }

  currentFile = e.target.files[0];
  currentFileName = currentFile.name;

  // FIX: update UI
  nameBox.textContent = currentFileName;

  encryptBtn.disabled = false;
  decryptBtn.disabled = false;
});

encryptBtn.onclick = () => processImage("encrypt");
decryptBtn.onclick = () => processImage("decrypt");

function processImage(mode) {
  if (!currentFile) return alert("Select an image");

  const key = document.getElementById("keyInput").value;
  if (!key) return alert("Enter password");

  const reader = new FileReader();

  reader.onload = (e) => {
    const img = new Image();

    img.onload = () => transform(img, key, mode);
    img.src = e.target.result;
  };

  reader.readAsDataURL(currentFile);
}

function transform(img, key, mode) {
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  canvas.width = img.width;
  canvas.height = img.height;

  ctx.drawImage(img, 0, 0);

  const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const arr = data.data;

  const rand = mulberry32(cyrb128(key)[0]);

  for (let i = 0; i < arr.length; i += 4) {
    arr[i] ^= Math.floor(rand() * 255);
    arr[i+1] ^= Math.floor(rand() * 255);
    arr[i+2] ^= Math.floor(rand() * 255);
  }

  ctx.putImageData(data, 0, 0);

  const result = canvas.toDataURL("image/png");

  showResult(result, mode);
}

function showResult(dataUrl, mode) {
  const label = mode === "encrypt" ? "Encrypted" : "Decrypted";

  document.getElementById("results").innerHTML = `
    <h4>${label} Image</h4>
    <img src="${dataUrl}">
    <button class="downloadBtn" onclick="downloadImage('${dataUrl}')">
      Save Image
    </button>
  `;
}

function downloadImage(dataUrl) {
  // Android app
  if (window.Android && Android.saveImage) {
    Android.saveImage(dataUrl);
    return;
  }

  // Browser fallback
  const a = document.createElement("a");
  a.href = dataUrl;
  a.download = "ntools-image.png";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

/* ===== crypto ===== */

function cyrb128(e) {
  let t = 1779033703, i = 3144134277, n = 1013904242, l = 27644437;
  for (let a, o = 0; o < e.length; o++) {
    a = e.charCodeAt(o);
    t = i ^ Math.imul(t ^ a, 597399067);
    i = n ^ Math.imul(i ^ a, 2869860233);
    n = l ^ Math.imul(n ^ a, 951274213);
    l = t ^ Math.imul(l ^ a, 2716044179);
  }
  t = Math.imul(n ^ t >>> 18, 597399067);
  i = Math.imul(l ^ i >>> 22, 2869860233);
  n = Math.imul(t ^ n >>> 17, 951274213);
  l = Math.imul(i ^ l >>> 19, 2716044179);
  return [(t ^ i ^ n ^ l) >>> 0, (i ^ t) >>> 0, (n ^ t) >>> 0, (l ^ t) >>> 0];
}

function mulberry32(e) {
  return function () {
    var t = e += 1831565813;
    t = Math.imul(t ^ t >>> 15, 1 | t);
    t ^= t + Math.imul(t ^ t >>> 7, 61 | t);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
</script>

</body>
</html>
